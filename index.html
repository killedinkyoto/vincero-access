<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VINCERO — Priority Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Cinzel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="particles"></canvas>

<div class="card">
    <h1>WORN BY THOSE WHO REMAIN</h1>

    <p>
        Secure priority access before public release.
    </p>

    <p class="scarcity">
        Final allocation. Access closing soon.
    </p>

    <form id="accessForm">
        <input 
            type="email" 
            id="email" 
            placeholder="Enter your email" 
            required
        >
        <button type="submit">
            Secure First Access
        </button>
    </form>

    <p style="margin-top:15px; opacity:0.6;">
        Invitation only.
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
